<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>

</head>

<body>
    <fieldset>
        <legend>Welcome the My World</legend>
        <h2>Rasistation Form</h2>
        <form>
            <label for="name">Enter the name</label>
            <input type="text" id="name" placeholder="Enter the name">
            <br>
            <br>
            <label for="date">Enter the date</label>
            <input type="date" id="date" placeholder="Enter your date">
            <br>
            <br>
            <label for="Email">Enter your Email</label>
            <input type="text" id="Email" placeholder="email">

            <br>
            <br>
            <label for="password">Enter your Password</label>
            <input type="password" id="password" placeholder="password">
            <br>
            <br>

            <label for="phno">Enter the Phone No</label>
            <input type="number" id="phno" placeholder="enter the phone No">

            <br>

            <input type="submit" value="Submit">
    </fieldset>
    </form>
</body>

</html>
