<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <fieldset>
        <legend>Form</legend>
        <form>
            <label for="name">Enter the name</label>
            <input type="text" id="name" placeholder="Enter the name">
            <br>
            <br>
            <label for="date">Enter the date</label>
            <input type="date" id="date" placeholder="Enter your date">
            <br>
            <br>
            <label for="Email">Enter your Email</label>
            <input type="text" id="Email" placeholder="email">

            <br>
            <br>
            <label for="password">Enter your Password</label>
            <input type="password" id="password" placeholder="password">
            <br>
            <br>

            <label for="phno">Enter the Phone No</label>
            <input type="number" id="phno" placeholder="enter the phone No">
            <br>
            <br>
            <label for="select1">Choose Fruits : </label>
            <select name="fruits" id="select1"> 
            <option value="papya">Papaya</option>
            <option value="mango">Mango</option>
            <option value="orange">Orange</option>
            <option value="guava" Guava></option>
            </select>






        </form>

    </fieldset>

</body>

</html>
